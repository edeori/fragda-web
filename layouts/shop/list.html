{{ define "main" }}

{{ $payment := .Site.GetPage "config/payment" }}
<meta name="paypal-email" content="{{ $payment.Params.paypal_email }}">

<div class="page-hero">
  <p class="page-hero__eyebrow">Merch</p>
  <h1 class="page-hero__title">Shop</h1>
</div>
<hr class="section-divider">

<section class="shop-section">
  <div class="container">
    <div class="shop-grid">
      {{ $products := where .Site.RegularPages "Section" "shop" }}
      {{ range $products }}
      {{ partial "product-card.html" . }}
      {{ end }}
    </div>
  </div>
</section>

{{ partial "cart.html" . }}

{{ end }}

{{ define "scripts" }}
<script src="{{ "/js/cart.js" | relURL }}"></script>
{{ end }}

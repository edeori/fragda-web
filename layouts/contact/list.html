{{ define "main" }}

<div class="page-hero">
  <p class="page-hero__eyebrow">Reach Out</p>
  <h1 class="page-hero__title">Contact</h1>
</div>
<hr class="section-divider">

<section class="contact-section">
  <div class="container">
    <div class="contact-form">

      {{ with .Params.email }}
      <p style="text-align:center; margin-bottom: 2.5rem; color: var(--text-muted); font-size: 0.9rem;">
        Or email directly:
        <a href="mailto:{{ . }}" style="color: var(--gold); font-weight: 600;">{{ . }}</a>
      </p>
      {{ end }}

      <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact">
        <p class="ohnohoney"><label>Do not fill: <input name="bot-field"></label></p>

        <div class="form-group">
          <label class="form-label" for="name">Name <span class="required">*</span></label>
          <input class="form-input" type="text" id="name" name="name" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email <span class="required">*</span></label>
          <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="subject">Subject <span class="required">*</span></label>
          <select class="form-select" id="subject" name="subject" required>
            {{ range .Params.subjects }}
            <option value="{{ . }}">{{ . }}</option>
            {{ end }}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="message">Message <span class="required">*</span></label>
          <textarea class="form-textarea" id="message" name="message" placeholder="Your message..." required></textarea>
        </div>

        <button type="submit" class="form-submit">Send Message</button>
      </form>

    </div>
  </div>
</section>

{{ end }}

{{ define "main" }}

<div class="page-hero">
  <p class="page-hero__eyebrow">{{ .Date.Format "January 2, 2006" }}</p>
  <h1 class="page-hero__title">{{ .Title }}</h1>
</div>
<hr class="section-divider">

<section class="post-section">
  <div class="container">
    <article class="post-article">

      <p class="post-back">
        <a href="{{ "/posts/" | relURL }}" class="btn btn-ghost btn-sm">
          <i class="fa-solid fa-arrow-left"></i> All News
        </a>
      </p>

      {{ with .Params.image }}
      <img src="{{ . }}" alt="{{ $.Title }}" class="post-featured-image" loading="lazy">
      {{ end }}

      <div class="post-content">
        {{ .Content }}
      </div>

      {{ with .Params.youtube }}
      {{ $ytid := . | replaceRE `.*(?:youtu\.be/|v=|embed/)([^?&"'>]+).*` "$1" }}
      <div class="post-video">
        <iframe
          src="https://www.youtube-nocookie.com/embed/{{ $ytid }}"
          title="{{ $.Title }}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>
      {{ end }}

    </article>
  </div>
</section>

{{ end }}

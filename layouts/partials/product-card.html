<div class="product-card">
  <div class="product-card__image">
    <img src="{{ .Params.image }}" alt="{{ .Title }}" class="product-image" loading="lazy">
  </div>
  <div class="product-card__body">
    <h2 class="product-title">{{ .Title }}</h2>
    <p class="product-price">{{ .Params.price }} {{ .Params.currency }}</p>

    {{ if .Params.availableSizes }}
    <div>
      <label class="product-label" for="size-{{ .Title | urlize }}">Size</label>
      <select class="product-size" id="size-{{ .Title | urlize }}">
        {{ range .Params.availableSizes }}
        <option value="{{ . }}">{{ . }}</option>
        {{ end }}
      </select>
    </div>
    {{ end }}

    <button class="add-to-cart"
      data-title="{{ .Title }}"
      data-price="{{ .Params.price }}"
      data-currency="{{ .Params.currency }}">
      <i class="fa-solid fa-cart-plus"></i> Add to Cart
    </button>
  </div>
</div>
